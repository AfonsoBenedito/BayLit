# Cloud Run single-container setup
# Previously: mongodb + backend + frontend (3 services)
# Now: single Go binary with embedded SQLite + React

services:
  baylit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/data/baylit.db
      - TOKEN_SECRET=${TOKEN_SECRET:-local-dev-secret-change-in-prod}
      - GIN_MODE=release
    volumes:
      - baylit_data:/data   # persistent locally; omit in Cloud Run for ephemeral
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  baylit_data:

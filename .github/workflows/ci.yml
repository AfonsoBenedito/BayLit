name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, for-cloud-run]

jobs:
  lint-go:
    name: Go — vet & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api-go/go.mod
          cache-dependency-path: api-go/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build ./...

  lint-frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Front-End/projeto-baylit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Front-End/projeto-baylit/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --ext .js,.jsx

      - name: Build
        run: npm run build
        env:
          REACT_APP_API_URL: /api

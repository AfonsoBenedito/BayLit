                    $ref: "#/components/schemas/Carrinho"
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"
  
  /utilizador/carrinho/transportes_possiveis:
    get:
      description: O consumidor consulta os transportes possiveis para transportarem a sua encomenda, de forma a poder tomar a decisão mais informada
      tags:
        - Compra
      parameters:
        - in: query
          name: consumidor
          required: true
          description: O consumidor que pretende consultar os transportes possiveis para transportarem o seu carrinho
          schema:
            type: string
            example: 12aw34wd5
        - in: query
          name: local_entrega
          required: true
          description: O local de entrega onde o consumidor pretende receber as suas compras. Utilizado no cálculo do transporte.
          schema:
            type: string
            example: 12aw34wd5
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Success
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Transporte"
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
            $ref: "#/components/responses/403"

  /utilizador/carrinho/compra:
    get:
      description: O consumidor efectua a compra de um carrinho de produtos
      tags:
        - Compra
      parameters:
        - in: query
          name: consumidor
          required: true
          description: O consumidor que pretende comprar os produtos
          schema:
            type: string
            example: 12aw34wd5
        - in: query
          name: local_entrega
          required: true
          description: O local de entrega onde o consumidor pretende receber as suas compras.
          schema:
            type: string
            example: 12aw34wd5
        - in: query
          name: transporte
          required: true
          description: O transporte selecionado pelo consumidor para fazer a recolha e a entrega das suas encomendas.
          schema:
            type: string
            example: 12aw34wd5
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Success
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Encomenda"
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
            $ref: "#/components/responses/403"

  /utilizador/carrinho/compra/confirmar:
    get:
      description: O consumidor confirma a compra de um carrinho de produtos. O pedido apenas será válido se o pagamento tiver sido efectuado.
      tags:
        - Compra
      parameters:
        - in: query
          name: consumidor
          required: true
          description: O consumidor que pretende comprar os produtos
          schema:
            type: string
            example: 12aw34wd5
        - in: query
          name: encomenda
          required: true
          description: O ID da encomenda por confirmar.
          schema:
            type: string
            example: 12aw34wd5
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Success
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Encomenda"
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
            $ref: "#/components/responses/403"


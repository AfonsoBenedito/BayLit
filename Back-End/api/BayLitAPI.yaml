openapi: 3.0.0
info:
  title: BayLitAPI
  description: A BayLitAPI destina-se a fornecer uma interface de interação com a aplicação web BayLit.
  version: 2.0.0

tags:
  - name: Autenticação
    description: Tudo sobre login e registos.
  - name: Produto
    description: Tudo sobre produtos, categorias e especificidades.
  - name: Cadeia Logística
    description: Tudo sobre a cadeia logística de um produto e as suas etapas.
  - name: Compra
    description: Tudo sobre as compras efectuadas na aplicação.
  - name: Utilizador
    description: Tudo sobre utilizadores gerais e as suas encomendas.
  - name: Consumidor
    description: Tudo sobre consumidores.
  - name: Fornecedor
    description: Tudo sobre fornecedores, armazéns e funcionários.
  - name: Transportador
    description: Tudo sobre transportadores, meios de transporte e condutores.

paths:

  /auth/register/consumidor:
    description: Registo de consumidor
    post:
      description: Registo de um consumidor novo
      tags:
        - Autenticação
      requestBody:
        required: true
        content: 
          application/json:
                schema:
                  type: object
                  properties:
                    nome:
                      type: string
                      example: Manuel Cardoso
                      description: Nome do Consumidor
                    email:
                      type: string
                      example: manel@gmail.com
                      description: Email do Consumidor
                    password:
                      type: string
                      example: pwd12_T1
                      description: Password do Consumidor
                  required:
                    - nome
                    - email
                    - password
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          tipo:
                            type: string
                            example: Consumidor
                          id:
                            type: string
                            example: abcdEFGH1234
                      auth_token:
                        type: string
                        example: abcdEFGH1234
                      expires:
                        type: string
                        example: 120m
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /auth/register/nao_autenticado:
    description: Registo de não autenticado
    post:
      description: Registo de um utlizador não autenticado
      tags:
        - Autenticação
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 201
                  title:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          tipo:
                            type: string
                            example: NaoAutenticado
                          id:
                            type: string
                            example: 6534BHrf32
                      auth_token:
                        type: string
                        example: abcdEFGH1234
                      expires:
                        type: string
                        example: 120m
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /auth/register/fornecedor:
    description: Registo de fornecedor
    post:
      description: Registo de um fornecedor novo
      tags:
        - Autenticação
      requestBody:
        required: true
        content: 
          application/json:
                schema:
                  type: object
                  properties:
                    nome:
                      type: string
                      example: Brinquedos Lda.
                      description: Nome do Fornecedor
                    email:
                      type: string
                      example: brinquedos@gmail.com
                      description: Email do Fornecedor
                    password:
                      type: string
                      example: pwd12_T1
                      description: Password do Fornecedor
                    morada:
                      type: string
                      example: Rua das Aventuras, nº 14
                      description: Morada do Fornecedor
                    nif:
                      type: integer
                      example: 82351423
                      description: NIF do Fornecedor
                    telemovel:
                      type: integer
                      example: 933333333
                      description: Telemovel do Fornecedor
                  required:
                    - nome
                    - email
                    - password
                    - morada
                    - nif
                    - telemovel
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 201
                  title:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          tipo:
                            type: string
                            example: Fornecedor
                          id:
                            type: string
                            example: 6534BHrf32
                      auth_token:
                        type: string
                        example: abcdEFGH1234
                      expires:
                        type: string
                        example: 120m
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /auth/register/transportador:
    description: Registo de transportador
    post:
      description: Registo de um transportador novo
      tags:
        - Autenticação
      requestBody:
        required: true
        content: 
          application/json:
                schema:
                  type: object
                  properties:
                    nome:
                      type: string
                      example: Transportes Lda.
                      description: Nome do Transportador
                    email:
                      type: string
                      example: transportes@gmail.com
                      description: Email do Transportador
                    password:
                      type: string
                      example: pwd12_T1
                      description: Password do Transportador
                    morada:
                      type: string
                      example: Rua das Aventuras, nº 14
                      description: Morada do Transportador
                    nif:
                      type: integer
                      example: 82351423
                      description: NIF do Transportador
                    telemovel:
                      type: integer
                      example: 933333333
                      description: Telemovel do Transportador
                    portes_encomenda:
                      type: integer
                      example: 4
                      description: Portes a cobrar por cada encomenda transportada
                  required:
                    - nome
                    - email
                    - password
                    - morada
                    - nif
                    - telemovel
                    - portes_encomenda
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 201
                  title:
                    type: string
                    example: Success
                  message:
                    type: string
                    example: O registo foi efetuado com sucesso 
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          tipo:
                            type: string
                            example: Transportador
                          id:
                            type: string
                            example: 6534BHrf32
                      auth_token:
                        type: string
                        example: abcdEFGH1234
                      expires:
                        type: string
                        example: 120m
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /auth/register/administrador:
    description: Registo de administrador
    post:
      security:
        - bearerAuth: []
      description: Registo de um administrador novo. Apenas autorizado a administradores autenticados pelo seu token.
      tags:
        - Autenticação
      requestBody:
        required: true
        content: 
          application/json:
                schema:
                  type: object
                  properties:
                    nome:
                      type: string
                      example: admin
                      description: Nome do Administrador
                    password:
                      type: string
                      example: Admin.123
                      description: Password do Administrador
                  required:
                    - nome
                    - password
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 201
                  title:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          tipo:
                            type: string
                            example: Administrador
                          id:
                            type: string
                            example: 6534BHrf32
                      auth_token:
                        type: string
                        example: abcdEFGH1234
                      expires:
                        type: string
                        example: 120m
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /auth/login:
    description: Login de utilizadores
    post:
      description: Login de utilizadores
      tags:
        - Autenticação
      requestBody:
        required: true
        content: 
          application/json:
                schema:
                  type: object
                  properties:
                    email:
                      type: string
                      example: manel
                      description: Email do Utilizador
                    password:
                      type: string
                      example: Manel.123
                      description: Password do Utilizador
                    id_nao_autenticado:
                      type: string
                      example: 6534BHrf32
                      description: ID do utilizador não autenticado, de forma a transportar os produtos no seu carrinho para a plataforma
                  required:
                    - nome
                    - password
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 200
                  title:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: 6543aH321
                          tipo:
                            type: string
                            example: Consumidor
                      auth_token:
                        type: string
                        example: abcdEFGH1234
                      expires:
                        type: string
                        example: 120m
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /auth/login/administrador:
    description: Login de administradores
    post:
      description: Login de administradores
      tags:
        - Autenticação
      requestBody:
        required: true
        content: 
          application/json:
                schema:
                  type: object
                  properties:
                    nome:
                      type: string
                      example: admin
                      description: Nome do Administrador
                    password:
                      type: string
                      example: Admin.123
                      description: Password do Administrador
                  required:
                    - nome
                    - password
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      user:
                          type: object
                          properties:
                            id:
                              type: string
                              example: 6543aH321
                            tipo:
                              type: string
                              example: Administrador
                      auth_token:
                        type: string
                        example: abcdEFGH1234
                      expires:
                        type: string
                        example: 120m
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /auth/login/verify_token:
    description: Verifica a validade de um token de autenticação
    post:
      security:
        - bearerAuth: []
      description: Verifica a validade de um token de autenticação
      tags:
        - Autenticação
      requestBody:
        required: true
        content: 
          application/json:
                schema:
                  type: object
                  properties:
                    nome:
                      type: string
                      example: admin
                      description: Nome do Administrador
                    password:
                      type: string
                      example: Admin.123
                      description: Password do Administrador
                  required:
                    - nome
                    - password
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Success
                  data:
                    type: object
                    properties:
                      user:
                          type: object
                          properties:
                            id:
                              type: string
                              example: 6543aH321
                            tipo:
                              type: string
                              example: Administrador
                      auth_token:
                        type: string
                        example: abcdEFGH1234
                      expires:
                        type: string
                        example: 120m
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /produto:
    description: Produto
    get:
      description: Obter os produtos registados na plataforma
      tags:
        - Produto
      parameters:
        - in: query
          name: id
          required: false
          description: Apenas o produto com o id especificado
          schema:
            type: integer
            example: 123456789
        - in: query
          name: fornecedor
          required: false
          description: Apenas produtos pertencentes ao catalogo do fornecedor com o id fornecido
          schema:
            type: integer
            example: 123456789
        - in: query
          name: categoria
          required: false
          description: Apenas produtos pertencentes à categoria com o id fornecido
          schema:
            type: integer
            example: 123456789
        - in: query
          name: subcategoria
          required: false
          description: Apenas produtos pertencentes à subcategoria com o id fornecido
          schema:
            type: integer
            example: 123456789
        - in: query
          name: cadeia
          required: false
          description: Junta a cadeia de cada produto ao corpo da resposta
          schema:
            type: boolean
            example: true
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:   
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Success
                  data:    
                    type: array
                    items:
                      $ref: "#/components/schemas/Produto"
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
            $ref: "#/components/responses/403"
    post:
      description: Um fornecedor insere um novo produto
      tags:
        - Produto
      requestBody:
        required: true
        content: 
          multipart/form-data:
            schema:
              type: object
              properties:
                fornecedor:
                  type: integer
                  example: 123456789
                  description: Fornecedor que produz o produto
                nome:
                  description: Nome do novo produto
                  type: string
                  example: Danoninho
                categoria:
                  description: Categoria do produto
                  type: string
                subcategoria:
                  description: SubCategoria do produto
                  type: string
                fotografias:
                  description: Fotografias do produto
                  type: string
                  format: binary
                informacao adicional:
                  description: Informação adicional sobre o produto
                  type: string
                  example: "Manter em local fresco e arejado"
              required:
                - fornecedor
                - nome
                - categoria
                - subcategoria
                - fotografias
      responses:
        200:
            description: Success
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    code:
                      type: integer
                      example: 201
                    message:
                      type: string
                      example: Created
                    data:    
                      type: array
                      items:
                        $ref: "#/components/schemas/Produto"
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"
    put:
      description: Um fornecedor edita um produto
      tags:
        - Produto
      requestBody:
        required: true
        content: 
          multipart/form-data:
            schema:
              type: object
              properties:
                produto:
                  type: string
                  example: 12ab34de56
                  description: Produto a editar
                nome:
                  description: Nome do novo produto
                  type: string
                  example: Danoninho
                categoria:
                  description: Categoria do produto
                  type: string
                fotografias:
                  description: Fotografias do produto
                  type: string
                  format: binary
                informacao adicional:
                  description: Informação adicional sobre o produto
                  type: string
                  example: "Manter em local fresco e arejado"

      responses:
        200:
            description: Success
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    code:
                      type: integer
                      example: 200
                    message:
                      type: string
                      example: Produto atualizado com sucesso
                    data:    
                      type: array
                      items:
                        $ref: "#/components/schemas/Produto"
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"
    
    delete:
      description: Um fornecedor elimina um produto
      tags:
        - Produto
      parameters:
        - in: query
          name: produto
          required: false
          description: Apenas o produto com o id especificado
          schema:
            type: integer
            example: 123456789
      responses:
        200:
            description: Success
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    code:
                      type: integer
                      example: 200
                    message:
                      type: string
                      example: Produto eliminado com sucesso
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /produto/pesquisa:
    get:
      description: Pesquisa personalizada de produtos
      tags:
        - Produto
      parameters:
        - in: query
          name: categoria
          required: false
          description: Pesquisa produto por categoria
          schema:
            type: string
            example: 12ab34cd56
        - in: query
          name: subcategoria
          required: false
          description: Pesquisa produto por subcategoria
          schema:
            type: string
            example: 12ab34cd56
        - in: query
          name: preco
          required: false
          description: Pesquisa produto por preço
          schema:
            type: object
            properties:
              valormenor:
                type: integer
                example: 20
              valormaio:
                type: integer
                example: 40
        - in: query
          name: ratingEcologico
          required: false
          description: Pesquisa produto por rating ecológico minimo
          schema:
            type: integer
            example: 3
        - in: query
          name: nome
          required: false
          description: Pesquisa produto por nome
          schema:
            type: string
            example: Headphones XPTO
        - in: query
          name: filtros
          required: false
          description: Pesquisa produto por filtros de atributos e valores
          schema:
            type: array
            items:
              type: object
              properties:
                atributo:
                  type: string
                  example: 12ab34cd
                valor:
                  type: string
                  example: vermelho
        
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: integer
                      example: 200
                    message:
                      type: string
                      example: Success
                    data:
                      type: array
                      items:
                        $ref: "#/components/schemas/Produto"
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
            $ref: "#/components/responses/403"
          
  /produto/categoria:
    get:
      description: Todas as categorias de produtos da plataforma
      tags:
        - Produto
      parameters:
        - in: query
          name: categoria
          required: false
          description: ID de uma categoria especifica
          schema:
            type: string
            example: 12ab34cd56eh
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: Success 
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Categoria"
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
            $ref: "#/components/responses/403"
    
    post:
      description: Um fornecedor insere uma nova categoria de produto (que terá de ser aprovada pelo administrador para ser inserida)
      tags:
        - Produto
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                  example: Chuteiras
                  description: Nome da nova categoria de produto
                fotografia:
                  type: string
                  format: binary
                  description: Fotografia da nova categoria de produto
              required:
                - nome
                - fotografia
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 201
                  message:
                    type: string
                    example: Success 
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Categoria"
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"
  
  /produto/categoria/subcategoria:
    get:
      description: Todas as subcategorias de produtos da categoria fornecida
      tags:
        - Produto
      parameters:
        - in: query
          name: categoria
          required: false
          description: Subcategorias de produtos da categoria fornecida
          schema:
            type: string
            example: 12ab34cd56eh789
        - in: query
          name: subcategoria
          required: false
          description: ID de uma subcategoria especifica
          schema:
            type: string
            example: 12ab34lu56is789
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: integer
                      example: 201
                    message:
                      type: string
                      example: Success 
                    data:
                      type: array
                      items:
                        $ref: "#/components/schemas/Subcategoria"
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
            $ref: "#/components/responses/403"
    
    post:
      description: Um fornecedor insere uma nova subcategoria de produto
      tags:
        - Produto
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                  example: Chuteiras Adidas
                  description: Nome da nova subcategoria de produto
                categoria:
                  type: integer
                  example: 123456789
                  description: Nome da categoria a que a subcategoria deverá pertencer
              required:
                - nome
                - categoria
      responses:
        201:
          description: Created
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: integer
                      example: 201
                    message:
                      type: string
                      example: Success 
                    data:
                      type: array
                      items:
                        $ref: "#/components/schemas/Subcategoria"
        400:
          $ref: "#/components/responses/400"
        403:
          $ref: "#/components/responses/403"

  /produto/categoria/subcategoria/atributo:
    get:
      description: Todos os atributos de uma subcategoria de produtos da plataforma
      tags:
        - Produto
      parameters:
        - in: query
          name: subcategoria
          required: false
          description: Apenas os atributos da subcategoria com id especificado
          schema:
            type: string
            example: 12ab34ja5789
        - in: query
          name: atributo
          required: false
          description: ID de atributo especifico
          schema:
            type: string
            example: 123am4ya56789
        
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: integer
                      example: 200
                    message:
                      type: string
                      example: Success 
                    data:
                      type: array
                      items:
                        $ref: "#/components/schemas/Atributo"
        204:
          $ref: "#/components/responses/204"
        400:
          $ref: "#/components/responses/400"
        403:
            $ref: "#/components/responses/403"
    
    post:
      description: Um fornecedor insere um novo atributo numa subcategoria de produto
      tags:
        - Produto
      requestBody:
        required: true
        content: 
          application/json:
            schema:
              type: object
              properties:
                atributo:
                  type: object
                  properties:
                    nome:
                      type: string
                      example: Cor
                    descricao:
